name: Daily Update

on:
  schedule:
    - cron: "59 22 * * *"
    - cron: "59 23 * * *"
  workflow_dispatch:
    inputs:
      london_date:
        description: "Optional London date to generate (YYYY-MM-DD). Defaults to today in Europe/London."
        required: false
        type: string
      post_to_slack:
        description: "Post the generated update to Slack."
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: read

jobs:
  daily-update:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      LLM_PROVIDER: ${{ vars.DAILY_UPDATE_LLM_PROVIDER || 'anthropic' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      DAILY_UPDATE_POST_TO_SLACK: "1"

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gate to 23:59 Europe/London
        id: gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          london_time=$(TZ=Europe/London date +%H:%M)
          if [ "$london_time" = "23:59" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping run because Europe/London local time is $london_time"
          fi

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Resolve workflow inputs
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.london_date }}" ]; then
              echo "DAILY_UPDATE_DATE=${{ inputs.london_date }}" >> "$GITHUB_ENV"
            fi

            if [ "${{ inputs.post_to_slack }}" = "true" ]; then
              echo "DAILY_UPDATE_POST_TO_SLACK=1" >> "$GITHUB_ENV"
            else
              echo "DAILY_UPDATE_POST_TO_SLACK=0" >> "$GITHUB_ENV"
            fi
          fi

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate archive and Slack update
        if: steps.gate.outputs.should_run == 'true'
        id: generate
        run: python -m app.integrations.daily_update

      - name: Commit generated archive
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          archive_path="${{ steps.generate.outputs.archive_path }}"
          if [ -z "$archive_path" ]; then
            echo "Daily update generator did not emit archive_path."
            exit 1
          fi

          if [ -z "$(git status --short -- "$archive_path")" ]; then
            echo "No archive changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$archive_path"
          git commit -m "docs(daily-update): archive ${{ steps.generate.outputs.london_date }}"
          git push
